name: 운영 로그인·화면 스모크
run-name: ${{ inputs.test_failure_notification && '[테스트] 운영 로그인·화면 스모크' || '운영 로그인·화면 스모크' }}

on:
  workflow_dispatch:
    inputs:
      test_failure_notification:
        description: "실패 아티팩트와 Telegram 알림 경로만 점검"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 18 * * *"

permissions:
  actions: read
  contents: read

concurrency:
  group: dashboard-visual-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TM_SMOKE_BASE_URL: ${{ secrets.TM_SMOKE_BASE_URL }}
      TM_SMOKE_COOKIE: ${{ secrets.TM_SMOKE_COOKIE }}
      TM_SMOKE_USERNAME: ${{ secrets.TM_SMOKE_USERNAME }}
      TM_SMOKE_PASSWORD: ${{ secrets.TM_SMOKE_PASSWORD }}
      TM_SMOKE_ARTIFACT_DIR: smoke-artifacts
      TM_SMOKE_ALERT_DETAIL_FILE: smoke-alert-detail.txt
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Node.js 준비
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: 예약 실행 설정 확인
        id: schedule
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "$TM_SMOKE_BASE_URL" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node scripts/smoke-schedule-check.mjs >> "$GITHUB_OUTPUT"

      - name: 한글 폰트 준비
        if: steps.schedule.outputs.should_run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: 운영 로그인·화면 검사
        if: steps.schedule.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TM_SMOKE_BASE_URL" ]]; then
            echo "::notice::TM_SMOKE_BASE_URL이 없어 self-test만 실행합니다."
            node scripts/smoke-services-browser-session.mjs --self-test
            exit 0
          fi
          if [[ -z "$TM_SMOKE_COOKIE" && ( -z "$TM_SMOKE_USERNAME" || -z "$TM_SMOKE_PASSWORD" ) ]]; then
            echo "::notice::인증 비밀값이 없어 self-test만 실행합니다."
            node scripts/smoke-services-browser-session.mjs --self-test
            exit 0
          fi
          if [[ "${{ inputs.test_failure_notification }}" == "true" ]]; then
            echo "::error::실패 알림 경로 점검을 위해 의도적으로 종료합니다."
            exit 1
          fi
          node scripts/smoke-services-browser-session.mjs

      - name: 실패 화면 업로드
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-visual-smoke-${{ github.run_id }}
          path: smoke-artifacts
          if-no-files-found: warn
          retention-days: 7

      - name: 반복 실패 알림 cooldown 확인
        id: alert_cooldown
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/smoke-alert-cooldown.mjs >> "$GITHUB_OUTPUT"

      - name: Telegram 실패 알림
        if: failure() && steps.alert_cooldown.outputs.suppress != 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TM_SMOKE_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TM_SMOKE_TELEGRAM_CHAT_ID }}
          TEST_FAILURE_NOTIFICATION: ${{ inputs.test_failure_notification }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "::notice::Telegram 비밀값이 없어 실패 알림을 건너뜁니다."
            exit 0
          fi
          title="Traefik Manager 운영 로그인·화면 스모크 실패"
          if [[ "$TEST_FAILURE_NOTIFICATION" == "true" ]]; then
            title="[테스트] Traefik Manager 운영 로그인·화면 스모크 실패"
          fi
          detail=""
          if [[ -s "$TM_SMOKE_ALERT_DETAIL_FILE" ]]; then
            detail="$(head -c 500 "$TM_SMOKE_ALERT_DETAIL_FILE" | tr '\r\n' ' ')"
          fi
          message="${title}
          저장소: ${GITHUB_REPOSITORY}
          커밋: ${GITHUB_SHA:0:12}
          실행: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ -n "$detail" ]]; then
            message="${message}
          상세: ${detail}"
          fi
          curl --fail --silent --show-error --output /dev/null \
            --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}"
