name: 프론트 의존성 보안 검사

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Node.js 준비
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: high 이상 취약점 차단
        run: npm --prefix frontend audit --package-lock-only --audit-level=high
