x-backend-docker-environment: &backend-docker-environment
  DOCKER_READ_API_URL: http://dockerproxy:2375
  DOCKER_MUTATION_API_URL: http://dockerproxy:2376

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
    args:
      TRAEFIK_MANAGER_VERSION: ${TRAEFIK_MANAGER_VERSION:-v1.36.7}
      TRAEFIK_MANAGER_GIT_SHA: ${TRAEFIK_MANAGER_GIT_SHA:-unknown}
      TRAEFIK_MANAGER_BUILD_DATE: ${TRAEFIK_MANAGER_BUILD_DATE:-unknown}
      TRAEFIK_MANAGER_IMAGE_SOURCE: ${TRAEFIK_MANAGER_IMAGE_SOURCE:-https://github.com/hanawa07/traefik-manager}
  image: traefik-manager-backend
  restart: unless-stopped
  env_file: ${APP_ENV_FILE:-.env}
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4).close()"]
    interval: 10s
    start_interval: 2s
    timeout: 5s
    retries: 3
    start_period: 20s
  volumes:
    - ./traefik-config:/traefik-config
    - backend-data:/app/data
    - /home/lizstudio/docker/traefik/letsencrypt/acme.json:/acme.json:ro
    - ${SMOKE_ROTATION_HOST_STATE_DIR:-/home/lizstudio/.local/state/traefik-manager}:/host-state/traefik-manager:ro
    - ${SMOKE_ROTATION_HOST_STATE_DIR:-/home/lizstudio/.local/state/traefik-manager}/traefik-update-requests:/host-requests/traefik-updates:rw
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  read_only: false
  tmpfs:
    - /tmp:noexec,nosuid,size=64m

x-frontend-common: &frontend-common
  build:
    context: ./frontend
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      TRAEFIK_MANAGER_VERSION: ${TRAEFIK_MANAGER_VERSION:-v1.36.7}
      TRAEFIK_MANAGER_GIT_SHA: ${TRAEFIK_MANAGER_GIT_SHA:-unknown}
      TRAEFIK_MANAGER_BUILD_DATE: ${TRAEFIK_MANAGER_BUILD_DATE:-unknown}
      TRAEFIK_MANAGER_IMAGE_SOURCE: ${TRAEFIK_MANAGER_IMAGE_SOURCE:-https://github.com/hanawa07/traefik-manager}
  image: traefik-manager-frontend
  restart: unless-stopped
  env_file: ${APP_ENV_FILE:-.env}
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    interval: 30s
    start_interval: 2s
    timeout: 5s
    retries: 3
    start_period: 20s
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=64m
    - /var/tmp:noexec,nosuid,size=64m
    - /app/.next/cache:noexec,nosuid,size=64m,uid=100,gid=101,mode=0755

services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: traefik-manager-dockerproxy
    restart: unless-stopped
    entrypoint: ["/usr/local/sbin/haproxy"]
    command: ["-f", "/usr/local/etc/haproxy/haproxy.cfg"]
    user: "65534:${DOCKER_SOCKET_GID:-988}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2375/_ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./deploy/docker-proxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-manager-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=8m

  init-traefik-config:
    image: alpine:3.20
    container_name: traefik-manager-init-traefik-config
    command: ["sh", "/init-traefik-config.sh"]
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      TRAEFIK_MANAGER_FRONTEND_UPSTREAM: ${TRAEFIK_MANAGER_FRONTEND_UPSTREAM:-http://traefik-manager-frontend:3000}
    restart: "no"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./traefik-config:/traefik-config
      - ./scripts/init-traefik-config.sh:/init-traefik-config.sh:ro

  backend:
    <<: *backend-common
    container_name: traefik-manager-backend
    depends_on:
      dockerproxy:
        condition: service_healthy
      init-traefik-config:
        condition: service_completed_successfully
    environment:
      <<: *backend-docker-environment
      TRAEFIK_MANAGER_SLOT: single
    networks:
      - traefik-manager-internal
      - traefik-manager-app
      - proxy_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - traefik.enable=true
      - traefik.docker.network=proxy_net
      - traefik.http.services.traefik-manager-backend.loadbalancer.server.port=8000

  frontend:
    <<: *frontend-common
    container_name: traefik-manager-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_UPSTREAM_URL: ${BACKEND_UPSTREAM_URL:-http://traefik-manager-backend:8000}
    depends_on:
      backend:
        condition: service_started
    networks:
      - traefik-manager-app
      - proxy_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - traefik.enable=false

  backend-blue:
    <<: *backend-common
    profiles: ["blue-green"]
    container_name: traefik-manager-backend-blue
    depends_on:
      dockerproxy:
        condition: service_healthy
      init-traefik-config:
        condition: service_completed_successfully
    environment:
      <<: *backend-docker-environment
      TRAEFIK_MANAGER_SLOT: blue
      TRAEFIK_MANAGER_BACKEND_CONTAINER_NAME: traefik-manager-backend-blue
      TRAEFIK_MANAGER_FRONTEND_CONTAINER_NAME: traefik-manager-frontend-blue
    networks:
      traefik-manager-internal:
      traefik-manager-app:
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - traefik.enable=false

  frontend-blue:
    <<: *frontend-common
    profiles: ["blue-green"]
    container_name: traefik-manager-frontend-blue
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_UPSTREAM_URL: http://traefik-manager-backend-blue:8000
    depends_on:
      backend-blue:
        condition: service_started
    networks:
      - traefik-manager-app
      - proxy_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - traefik.enable=false

  backend-green:
    <<: *backend-common
    profiles: ["blue-green"]
    container_name: traefik-manager-backend-green
    depends_on:
      dockerproxy:
        condition: service_healthy
      init-traefik-config:
        condition: service_completed_successfully
    environment:
      <<: *backend-docker-environment
      TRAEFIK_MANAGER_SLOT: green
      TRAEFIK_MANAGER_BACKEND_CONTAINER_NAME: traefik-manager-backend-green
      TRAEFIK_MANAGER_FRONTEND_CONTAINER_NAME: traefik-manager-frontend-green
    networks:
      traefik-manager-internal:
      traefik-manager-app:
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - traefik.enable=false

  frontend-green:
    <<: *frontend-common
    profiles: ["blue-green"]
    container_name: traefik-manager-frontend-green
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_UPSTREAM_URL: http://traefik-manager-backend-green:8000
    depends_on:
      backend-green:
        condition: service_started
    networks:
      - traefik-manager-app
      - proxy_net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - traefik.enable=false

volumes:
  backend-data:

networks:
  traefik-manager-internal:
    internal: true
  traefik-manager-app:
    internal: true
  proxy_net:
    external: true
