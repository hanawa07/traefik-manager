services:
  init-traefik-config:
    image: alpine:3.20
    container_name: traefik-manager-init-traefik-config
    command: ["sh", "-c", "mkdir -p /traefik-config/dynamic && chown -R 10001:10001 /traefik-config"]
    restart: "no"
    volumes:
      - ./traefik-config:/traefik-config

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traefik-manager-backend
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      init-traefik-config:
        condition: service_completed_successfully
    volumes:
      - ./traefik-config:/traefik-config
      - backend-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-manager-internal
      - proxy-network
      - proxy_net
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-network
      - traefik.http.routers.traefik-manager-backend.rule=Host(`${BACKEND_DOMAIN}`)
      - traefik.http.routers.traefik-manager-backend.entrypoints=websecure
      - traefik.http.routers.traefik-manager-backend.tls=true
      - traefik.http.routers.traefik-manager-backend.tls.certresolver=letsencrypt
      - traefik.http.services.traefik-manager-backend.loadbalancer.server.port=8000
      - traefik.http.routers.traefik-manager-backend-http.rule=Host(`${BACKEND_DOMAIN}`)
      - traefik.http.routers.traefik-manager-backend-http.entrypoints=web
      - traefik.http.routers.traefik-manager-backend-http.middlewares=traefik-manager-backend-https
      - traefik.http.middlewares.traefik-manager-backend-https.redirectscheme.scheme=https
      - traefik.http.middlewares.traefik-manager-backend-https.redirectscheme.permanent=true
      # 로그인 엔드포인트 rate limiting (1분에 최대 10회, burst 5)
      - traefik.http.middlewares.login-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.login-ratelimit.ratelimit.burst=5
      - traefik.http.middlewares.login-ratelimit.ratelimit.period=1m
      - traefik.http.middlewares.login-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1
      - traefik.http.routers.traefik-manager-login.rule=Host(`${BACKEND_DOMAIN}`) && Path(`/api/v1/auth/login`)
      - traefik.http.routers.traefik-manager-login.entrypoints=websecure
      - traefik.http.routers.traefik-manager-login.tls=true
      - traefik.http.routers.traefik-manager-login.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik-manager-login.middlewares=login-ratelimit
      - traefik.http.routers.traefik-manager-login.service=traefik-manager-backend
      - traefik.http.routers.traefik-manager-login.priority=10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: traefik-manager-frontend
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      BACKEND_UPSTREAM_URL: ${BACKEND_UPSTREAM_URL:-http://backend:8000}
    depends_on:
      - backend
    networks:
      - proxy-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /var/tmp:noexec,nosuid,size=64m
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-network
      - traefik.http.routers.traefik-manager-frontend.rule=Host(`${FRONTEND_DOMAIN}`)
      - traefik.http.routers.traefik-manager-frontend.entrypoints=websecure
      - traefik.http.routers.traefik-manager-frontend.tls=true
      - traefik.http.routers.traefik-manager-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.traefik-manager-frontend.loadbalancer.server.port=3000
      - traefik.http.routers.traefik-manager-frontend-http.rule=Host(`${FRONTEND_DOMAIN}`)
      - traefik.http.routers.traefik-manager-frontend-http.entrypoints=web
      - traefik.http.routers.traefik-manager-frontend-http.middlewares=traefik-manager-frontend-https
      - traefik.http.middlewares.traefik-manager-frontend-https.redirectscheme.scheme=https
      - traefik.http.middlewares.traefik-manager-frontend-https.redirectscheme.permanent=true

volumes:
  backend-data:

networks:
  traefik-manager-internal:
    internal: true
  proxy-network:
    external: true
  proxy_net:
    external: true
